<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Control PV</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f4f6fb; --panel:#ffffff; --primary:#1f5eff; --primary2:#143fb0; --text:#172033;
      --muted:#65738a; --border:#dce3ef; --danger:#d93025; --ok:#138a36; --warn:#b7791f;
      --shadow:0 10px 30px rgba(21,39,78,.12); --radius:16px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial, Helvetica, sans-serif;background:var(--bg);color:var(--text)}
    .hidden{display:none!important}
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#173b9a,#0fb4ff)}
    .login-card{background:#fff;width:100%;max-width:390px;border-radius:22px;box-shadow:var(--shadow);padding:28px}
    .login-card h1{margin:0 0 8px;font-size:30px}.login-card p{margin:0 0 22px;color:var(--muted)}
    label{font-size:13px;font-weight:bold;color:#34405a;display:block;margin-bottom:6px}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:14px;background:#fff;color:var(--text);outline:none}
    textarea{min-height:72px;resize:vertical}.field{margin-bottom:13px}
    button{border:0;border-radius:10px;padding:10px 14px;font-weight:bold;cursor:pointer;background:var(--primary);color:#fff;transition:.15s;font-size:14px}
    button:hover{background:var(--primary2)}button.secondary{background:#e8edf7;color:#20304d}button.secondary:hover{background:#d7dfef}
    button.danger{background:var(--danger)}button.ok{background:var(--ok)}button.warn{background:var(--warn)}button.small{padding:7px 10px;font-size:12px}
    .app{display:grid;grid-template-columns:245px 1fr;min-height:100vh}.sidebar{background:#101a2f;color:#fff;padding:18px;position:sticky;top:0;height:100vh}
    .brand{font-size:24px;font-weight:900;margin-bottom:4px}.subtitle{color:#9fb1d2;font-size:12px;margin-bottom:18px}
    .userbox{font-size:12px;background:#172641;border-radius:12px;padding:10px;margin-bottom:16px;line-height:1.55}.nav button{width:100%;margin:6px 0;text-align:left;background:#172641}.nav button.active,.nav button:hover{background:var(--primary)}
    .main{padding:20px 24px}.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}.topbar h2{margin:0;font-size:26px}.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px}.item-card{border:1px solid var(--border);border-radius:14px;background:#fff;padding:14px;box-shadow:0 4px 14px rgba(20,31,55,.07)}
    .item-card h3{margin:0 0 6px;font-size:18px}.meta{font-size:12px;color:var(--muted);margin:3px 0}.price{font-size:22px;font-weight:900;margin:8px 0}.stock{display:inline-block;padding:4px 8px;border-radius:999px;background:#edf7ed;color:#136b2c;font-size:12px;font-weight:bold}.stock.low{background:#fff3cd;color:#8a5c00}.stock.zero{background:#fde8e6;color:#b42318}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:14px;overflow:hidden}th,td{border-bottom:1px solid var(--border);padding:10px;text-align:left;font-size:13px}th{background:#f0f4fb;color:#34405a}tr:hover td{background:#fafcff}
    .pos-layout{display:grid;grid-template-columns:1fr 410px;gap:16px}.cart-row{display:grid;grid-template-columns:1fr 70px 80px 34px;gap:8px;align-items:center;border-bottom:1px solid var(--border);padding:8px 0}.totals{font-size:18px}.grand{font-size:30px;font-weight:900;color:#0f3d91}.search-list{max-height:430px;overflow:auto}.product-line{display:grid;grid-template-columns:1fr 95px 80px;gap:10px;align-items:center;border-bottom:1px solid var(--border);padding:10px 0}
    .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:18px;z-index:10}.modal{background:#fff;width:100%;max-width:760px;border-radius:18px;box-shadow:var(--shadow);max-height:92vh;overflow:auto}.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-bottom:1px solid var(--border)}.modal-head h3{margin:0}.modal-body{padding:18px}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.alert{padding:10px;border-radius:10px;margin:10px 0;background:#fff3cd;color:#6a4a00}.success{background:#e9f7ef;color:#0b6b2b}.error{background:#fde8e6;color:#9c1c13}
    @media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{height:auto;position:relative}.pos-layout{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div id="login" class="login-wrap">
    <div class="login-card">
      <h1>Control PV</h1>
      <p>Punto de venta e inventario</p>
      <div class="field"><label>Usuario</label><input id="loginUsuario" autocomplete="off" /></div>
      <div class="field"><label>Contraseña</label><input id="loginPassword" type="password" autocomplete="off" /></div>
      <button style="width:100%" onclick="login()">Entrar</button>
      <div id="loginMsg"></div>
    </div>
  </div>

  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand">Control PV</div>
      <div class="subtitle">Punto de venta</div>
      <div class="userbox">
        <b id="userName"></b><br>
        Perfil: <span id="userPerfil"></span><br>
        <span id="clock"></span>
      </div>
      <div class="nav">
        <button id="navVentas" onclick="showModule('ventas')">🛒 Ventas</button>
        <button id="navArticulos" onclick="showModule('articulos')">📦 Artículos / Inventario</button>
        <button id="navUsuarios" onclick="showModule('usuarios')">👤 Usuarios</button>
        <button id="navReportes" onclick="showModule('reportes')">📊 Ventas diarias</button>
        <button class="secondary" onclick="logout()">Salir</button>
      </div>
    </aside>

    <main class="main">
      <section id="modVentas" class="module hidden">
        <div class="topbar"><h2>Ventas</h2><div class="toolbar"><button class="secondary" onclick="clearCart()">Nueva venta</button></div></div>
        <div class="pos-layout">
          <div class="card">
            <div class="toolbar"><input id="buscarVenta" placeholder="Buscar por código o nombre" oninput="renderProductosVenta()"></div>
            <div id="productosVenta" class="search-list"></div>
          </div>
          <div class="card">
            <h3>Carrito</h3>
            <div id="carrito"></div>
            <hr>
            <div class="totals">Total:</div><div id="totalVenta" class="grand">$0.00</div>
            <div class="field"><label>Pago recibido</label><input id="pagoVenta" type="number" min="0" step="0.01" oninput="renderCart()"></div>
            <div class="totals">Cambio: <b id="cambioVenta">$0.00</b></div><br>
            <button class="ok" style="width:100%" onclick="finalizarVenta()">Cobrar venta</button>
            <div id="ventaMsg"></div>
          </div>
        </div>
      </section>

      <section id="modArticulos" class="module hidden">
        <div class="topbar"><h2>Artículos / Inventario</h2><div class="toolbar"><input id="buscarArticulo" placeholder="Buscar artículo" oninput="loadArticulos()"><button onclick="openArticuloModal()">Nuevo artículo</button></div></div>
        <div id="articulosGrid" class="grid"></div>
      </section>

      <section id="modUsuarios" class="module hidden">
        <div class="topbar"><h2>Usuarios</h2><div class="toolbar"><button onclick="openUsuarioModal()">Nuevo usuario</button></div></div>
        <div class="card"><table><thead><tr><th>Usuario</th><th>Contraseña</th><th>Perfil</th><th>Estatus</th><th>Acciones</th></tr></thead><tbody id="usuariosTable"></tbody></table></div>
      </section>

      <section id="modReportes" class="module hidden">
        <div class="topbar"><h2>Ventas diarias</h2><div class="toolbar"><input id="fechaReporte" type="date" onchange="loadReportes()"></div></div>
        <div class="card"><h3 id="resumenDia">Total del día: $0.00</h3><table><thead><tr><th>Folio</th><th>Fecha</th><th>Usuario</th><th>Total</th><th>Pago</th><th>Cambio</th></tr></thead><tbody id="ventasTable"></tbody></table></div>
      </section>
    </main>
  </div>

  <div id="modalBack" class="modal-back hidden">
    <div class="modal">
      <div class="modal-head"><h3 id="modalTitle"></h3><button class="secondary small" onclick="closeModal()">Cerrar</button></div>
      <div id="modalBody" class="modal-body"></div>
    </div>
  </div>

<script>
const SUPABASE_URL = 'https://atoauxlkolstldtduwnn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0b2F1eGxrb2xzdGxkdGR1d25uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTQwMjcsImV4cCI6MjA5NzA5MDAyN30.QH8rpZ618HZsA-eNRxdKlhisUh4N1aHeUuV4s3EIKK0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null, articulos = [], cart = [];

const money = n => new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN'}).format(Number(n||0));
const fmtDate = d => new Date(d).toLocaleString('es-MX');
function msg(id, text, cls='alert'){document.getElementById(id).innerHTML = text ? `<div class="${cls}">${text}</div>` : '';}

window.addEventListener('load',()=>{
  document.getElementById('loginUsuario').value=''; document.getElementById('loginPassword').value='';
  document.getElementById('loginPassword').addEventListener('keydown',e=>{if(e.key==='Enter') login();});
  setInterval(()=>{ const c=document.getElementById('clock'); if(c) c.textContent=new Date().toLocaleString('es-MX');},1000);
});

async function login(){
  const usuario = document.getElementById('loginUsuario').value.trim();
  const password = document.getElementById('loginPassword').value;
  if(!usuario || !password) return msg('loginMsg','Captura usuario y contraseña.','alert error');
  const {data,error} = await sb.rpc('cpv_login',{p_usuario:usuario,p_password:password});
  if(error){ console.error(error); return msg('loginMsg','Error de conexión o función login no creada.','alert error'); }
  if(!data || data.length===0) return msg('loginMsg','Usuario o contraseña incorrectos, o usuario dado de baja.','alert error');
  currentUser = data[0];
  document.getElementById('login').classList.add('hidden'); document.getElementById('app').classList.remove('hidden');
  document.getElementById('userName').textContent=currentUser.usuario; document.getElementById('userPerfil').textContent=currentUser.perfil;
  applyPermissions(); showModule('ventas');
}
function logout(){ currentUser=null; cart=[]; location.reload(); }
function isAdmin(){ return currentUser && currentUser.perfil==='Administrador'; }
function applyPermissions(){
  document.getElementById('navArticulos').style.display = isAdmin() ? 'block' : 'none';
  document.getElementById('navUsuarios').style.display = isAdmin() ? 'block' : 'none';
  document.getElementById('navReportes').style.display = isAdmin() ? 'block' : 'none';
}
async function showModule(m){
  document.querySelectorAll('.module').forEach(x=>x.classList.add('hidden'));
  document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
  if(m!=='ventas' && !isAdmin()) m='ventas';
  document.getElementById('mod'+m[0].toUpperCase()+m.slice(1)).classList.remove('hidden');
  const nav=document.getElementById('nav'+m[0].toUpperCase()+m.slice(1)); if(nav) nav.classList.add('active');
  if(m==='ventas'){ await loadArticulos(); renderProductosVenta(); renderCart(); }
  if(m==='articulos') await loadArticulos();
  if(m==='usuarios') await loadUsuarios();
  if(m==='reportes'){ document.getElementById('fechaReporte').value ||= new Date().toISOString().slice(0,10); await loadReportes(); }
}

async function loadArticulos(){
  let q = sb.from('cpv_articulos').select('*').order('nombre');
  const s = document.getElementById('buscarArticulo')?.value?.trim();
  if(s) q = q.or(`nombre.ilike.%${s}%,codigo.ilike.%${s}%,descripcion.ilike.%${s}%`);
  const {data,error}=await q; if(error){console.error(error); return;}
  articulos=data||[]; renderArticulos(); renderProductosVenta();
}
function stockClass(n){ return n<=0?'zero':(n<=5?'low':''); }
function renderArticulos(){
  const el=document.getElementById('articulosGrid'); if(!el) return;
  el.innerHTML = articulos.map(a=>`<div class="item-card"><h3>${a.nombre}</h3><div class="meta">Código: ${a.codigo||'-'}</div><div class="meta">${a.descripcion||''}</div><div class="price">${money(a.precio_venta)}</div><span class="stock ${stockClass(a.inventario_piezas)}">Inventario: ${a.inventario_piezas} pzas</span><div class="meta">Estatus: ${a.estatus}</div><br><button class="small" onclick='openArticuloModal(${JSON.stringify(a)})'>Editar</button> <button class="small secondary" onclick='openInventarioModal(${JSON.stringify(a)})'>Ajustar inventario</button></div>`).join('') || '<div class="card">No hay artículos.</div>';
}
function openArticuloModal(a=null){
  if(!isAdmin()) return;
  document.getElementById('modalTitle').textContent = a?'Editar artículo':'Nuevo artículo';
  document.getElementById('modalBody').innerHTML = `<div class="form-grid"><div class="field"><label>Código</label><input id="aCodigo" value="${a?.codigo||''}"></div><div class="field"><label>Nombre</label><input id="aNombre" value="${a?.nombre||''}"></div><div class="field"><label>Precio venta</label><input id="aPrecio" type="number" step="0.01" value="${a?.precio_venta||0}"></div><div class="field"><label>Inventario piezas</label><input id="aInv" type="number" value="${a?.inventario_piezas||0}"></div><div class="field"><label>Estatus</label><select id="aEstatus"><option ${a?.estatus==='Activo'?'selected':''}>Activo</option><option ${a?.estatus==='Inactivo'?'selected':''}>Inactivo</option></select></div><div class="field"><label>Descripción</label><textarea id="aDesc">${a?.descripcion||''}</textarea></div></div><button onclick="saveArticulo('${a?.id||''}')">Guardar artículo</button><div id="modalMsg"></div>`;
  openModal();
}
async function saveArticulo(id){
  const row={codigo:document.getElementById('aCodigo').value.trim()||null,nombre:document.getElementById('aNombre').value.trim(),descripcion:document.getElementById('aDesc').value.trim(),precio_venta:Number(document.getElementById('aPrecio').value||0),inventario_piezas:parseInt(document.getElementById('aInv').value||0),estatus:document.getElementById('aEstatus').value,creado_por:currentUser.id};
  if(!row.nombre) return msg('modalMsg','El nombre es obligatorio.','alert error');
  let res = id ? await sb.from('cpv_articulos').update({...row,actualizado_en:new Date().toISOString()}).eq('id',id) : await sb.from('cpv_articulos').insert(row);
  if(res.error){console.error(res.error); return msg('modalMsg',res.error.message,'alert error');}
  closeModal(); await loadArticulos();
}
function openInventarioModal(a){
  document.getElementById('modalTitle').textContent='Ajustar inventario';
  document.getElementById('modalBody').innerHTML=`<p><b>${a.nombre}</b><br>Inventario actual: ${a.inventario_piezas}</p><div class="field"><label>Nuevo inventario en piezas</label><input id="nuevoInv" type="number" value="${a.inventario_piezas}"></div><div class="field"><label>Comentario</label><textarea id="invComentario">Ajuste manual</textarea></div><button onclick="saveInventario('${a.id}',${a.inventario_piezas})">Guardar ajuste</button><div id="modalMsg"></div>`; openModal();
}
async function saveInventario(id, anterior){
  const nuevo=parseInt(document.getElementById('nuevoInv').value||0); if(nuevo<0) return msg('modalMsg','El inventario no puede ser negativo.','alert error');
  const {error}=await sb.from('cpv_articulos').update({inventario_piezas:nuevo,actualizado_en:new Date().toISOString()}).eq('id',id);
  if(error) return msg('modalMsg',error.message,'alert error');
  await sb.from('cpv_movimientos_inventario').insert({articulo_id:id,tipo:'Ajuste',cantidad:nuevo-anterior,inventario_anterior:anterior,inventario_nuevo:nuevo,comentario:document.getElementById('invComentario').value,usuario_id:currentUser.id});
  closeModal(); await loadArticulos();
}

function renderProductosVenta(){
  const el=document.getElementById('productosVenta'); if(!el) return;
  const s=(document.getElementById('buscarVenta')?.value||'').toLowerCase();
  const list=articulos.filter(a=>a.estatus==='Activo' && (!s || `${a.codigo} ${a.nombre} ${a.descripcion}`.toLowerCase().includes(s)));
  el.innerHTML=list.map(a=>`<div class="product-line"><div><b>${a.nombre}</b><div class="meta">${a.codigo||'-'} | Stock: ${a.inventario_piezas}</div></div><div><b>${money(a.precio_venta)}</b></div><button class="small" ${a.inventario_piezas<=0?'disabled':''} onclick="addCart('${a.id}')">Agregar</button></div>`).join('') || 'No hay artículos activos.';
}
function addCart(id){
  const a=articulos.find(x=>x.id===id); if(!a || a.inventario_piezas<=0) return;
  const it=cart.find(x=>x.articulo_id===id); if(it){ if(it.cantidad<a.inventario_piezas) it.cantidad++; } else cart.push({articulo_id:a.id,codigo:a.codigo,nombre:a.nombre,cantidad:1,precio_unitario:Number(a.precio_venta),stock:a.inventario_piezas});
  renderCart();
}
function renderCart(){
  const el=document.getElementById('carrito'); if(!el) return;
  el.innerHTML=cart.map((x,i)=>`<div class="cart-row"><div><b>${x.nombre}</b><div class="meta">${money(x.precio_unitario)} c/u</div></div><input type="number" min="1" max="${x.stock}" value="${x.cantidad}" onchange="cart[${i}].cantidad=Math.max(1,Math.min(${x.stock},parseInt(this.value||1)));renderCart()"><div>${money(x.cantidad*x.precio_unitario)}</div><button class="danger small" onclick="cart.splice(${i},1);renderCart()">×</button></div>`).join('') || '<div class="meta">Carrito vacío.</div>';
  const total=cart.reduce((s,x)=>s+x.cantidad*x.precio_unitario,0); const pago=Number(document.getElementById('pagoVenta')?.value||0);
  document.getElementById('totalVenta').textContent=money(total); document.getElementById('cambioVenta').textContent=money(Math.max(0,pago-total));
}
function clearCart(){ cart=[]; document.getElementById('pagoVenta').value=''; msg('ventaMsg',''); renderCart(); }
async function finalizarVenta(){
  if(cart.length===0) return msg('ventaMsg','Agrega artículos al carrito.','alert error');
  const total=cart.reduce((s,x)=>s+x.cantidad*x.precio_unitario,0), pago=Number(document.getElementById('pagoVenta').value||0);
  if(pago<total) return msg('ventaMsg','El pago recibido no puede ser menor al total.','alert error');
  const items=cart.map(x=>({articulo_id:x.articulo_id,cantidad:x.cantidad,precio_unitario:x.precio_unitario}));
  const {data,error}=await sb.rpc('cpv_registrar_venta',{p_usuario_id:currentUser.id,p_usuario_nombre:currentUser.usuario,p_pago:pago,p_items:items});
  if(error){console.error(error); return msg('ventaMsg',error.message,'alert error');}
  msg('ventaMsg',`Venta cobrada. Folio ${data[0].folio}. Cambio ${money(data[0].cambio)}.`,'alert success'); cart=[]; document.getElementById('pagoVenta').value=''; await loadArticulos(); renderCart();
}

async function loadUsuarios(){
  const {data,error}=await sb.from('cpv_usuarios').select('*').order('usuario'); if(error){console.error(error);return;}
  document.getElementById('usuariosTable').innerHTML=(data||[]).map(u=>`<tr><td>${u.usuario}</td><td>${u.password}</td><td>${u.perfil}</td><td>${u.estatus}</td><td><button class="small" onclick='openUsuarioModal(${JSON.stringify(u)})'>Editar</button></td></tr>`).join('');
}
function openUsuarioModal(u=null){
  if(!isAdmin()) return;
  document.getElementById('modalTitle').textContent=u?'Editar usuario':'Nuevo usuario';
  document.getElementById('modalBody').innerHTML=`<div class="form-grid"><div class="field"><label>Usuario</label><input id="uUsuario" value="${u?.usuario||''}"></div><div class="field"><label>Contraseña</label><input id="uPassword" value="${u?.password||''}"></div><div class="field"><label>Perfil</label><select id="uPerfil"><option ${u?.perfil==='Administrador'?'selected':''}>Administrador</option><option ${u?.perfil==='Ventas'?'selected':''}>Ventas</option></select></div><div class="field"><label>Estatus</label><select id="uEstatus"><option ${u?.estatus==='Alta'?'selected':''}>Alta</option><option ${u?.estatus==='Baja'?'selected':''}>Baja</option></select></div></div><button onclick="saveUsuario('${u?.id||''}')">Guardar usuario</button><div id="modalMsg"></div>`; openModal();
}
async function saveUsuario(id){
  const row={usuario:document.getElementById('uUsuario').value.trim(),password:document.getElementById('uPassword').value,perfil:document.getElementById('uPerfil').value,estatus:document.getElementById('uEstatus').value};
  if(!row.usuario||!row.password) return msg('modalMsg','Usuario y contraseña son obligatorios.','alert error');
  const res=id?await sb.from('cpv_usuarios').update({...row,actualizado_en:new Date().toISOString()}).eq('id',id):await sb.from('cpv_usuarios').insert(row);
  if(res.error) return msg('modalMsg',res.error.message,'alert error'); closeModal(); await loadUsuarios();
}

async function loadReportes(){
  const f=document.getElementById('fechaReporte').value; if(!f) return;
  const start=new Date(f+'T00:00:00'); const end=new Date(f+'T23:59:59');
  const {data,error}=await sb.from('cpv_ventas').select('*').gte('fecha',start.toISOString()).lte('fecha',end.toISOString()).order('fecha',{ascending:false});
  if(error){console.error(error);return;}
  const total=(data||[]).filter(v=>v.estatus==='Pagada').reduce((s,v)=>s+Number(v.total||0),0);
  document.getElementById('resumenDia').textContent=`Total del día: ${money(total)} | Ventas: ${(data||[]).length}`;
  document.getElementById('ventasTable').innerHTML=(data||[]).map(v=>`<tr><td>${v.folio}</td><td>${fmtDate(v.fecha)}</td><td>${v.usuario_nombre||''}</td><td>${money(v.total)}</td><td>${money(v.pago)}</td><td>${money(v.cambio)}</td></tr>`).join('');
}
function openModal(){document.getElementById('modalBack').classList.remove('hidden');}
function closeModal(){document.getElementById('modalBack').classList.add('hidden');document.getElementById('modalBody').innerHTML='';}
</script>
</body>
</html>
